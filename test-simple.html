<!DOCTYPE html>
<html>
<head>
    <title>Simple JMON Test</title>
</head>
<body>
    <h1>Simple JMON Import Test</h1>
    <div id="result"></div>

    <script type="module">
        try {
            console.log("Importing JMON...");
            const jm = await import("http://localhost:8000/src/index.js");
            console.log("✅ JMON imported successfully:", jm);
            document.getElementById("result").innerHTML = "<p style='color: green'>✅ JMON imported successfully!</p>";

            // Test basic functionality
            const testComposition = {
                tracks: [{
                    notes: [
                        { pitch: 60, duration: 1, time: 0 },
                        { pitch: 64, duration: 1, time: 1 }
                    ]
                }]
            };

            const abcResult = jm.default.converters.abc(testComposition);
            console.log("ABC conversion test:", abcResult);
            document.getElementById("result").innerHTML += "<p>ABC conversion working: " + (abcResult ? "✅" : "❌") + "</p>";

        } catch (error) {
            console.error("❌ Import failed:", error);
            document.getElementById("result").innerHTML = `<p style='color: red'>❌ Import failed: ${error.message}</p>`;
        }
    </script>
</body>
</html>
